  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0F0F0F;
      overflow-x: hidden;
    }

    body {
      box-sizing: border-box;
      min-height: 100vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      -webkit-tap-highlight-color: transparent;
    }

    * {
      box-sizing: border-box;
    }

    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .font-body { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-up {
      animation: fadeUp 0.15s ease-out forwards;
      opacity: 0;
      will-change: opacity, transform;
    }

    .delay-1 { animation-delay: 0.01s; }
    .delay-2 { animation-delay: 0.02s; }
    .delay-3 { animation-delay: 0.03s; }
    .delay-4 { animation-delay: 0.04s; }
    .delay-5 { animation-delay: 0.05s; }
    .delay-6 { animation-delay: 0.06s; }

    .menu-category { scroll-margin-top: 80px; }

    .btn-action {
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
      will-change: transform;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .btn-action:active {
      transform: scale(0.97);
    }

    .diamond-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 0;
    }

    .diamond-divider span {
      width: 6px;
      height: 6px;
      background: #F2C744;
      transform: rotate(45deg);
      display: inline-block;
    }

    .diamond-divider span:nth-child(2) {
      width: 8px;
      height: 8px;
    }

    .menu-item-row {
      transition: background 0.15s ease-out;
      -webkit-user-select: none;
      user-select: none;
    }

    .menu-item-row:active {
      background: rgba(242, 199, 68, 0.08);
    }

    .language-selector {
      position: fixed;
      top: 16px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 50;
      background: rgba(26, 26, 26, 0.85);
      backdrop-filter: blur(6px);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(242, 199, 68, 0.25);
    }

    .lang-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 7px;
      transition: all 0.15s ease-out;
      background: transparent;
      padding: 0;
      font-size: 24px;
      line-height: 1;
      will-change: transform, border-color, background, box-shadow;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .lang-btn.active {
      border-color: #F2C744;
      background: rgba(242, 199, 68, 0.18);
      color: #F2C744;
      box-shadow: 0 0 12px rgba(242, 199, 68, 0.15);
    }

    .lang-btn:active {
      transform: scale(0.95);
    }

    .lang-btn.active:active {
      color: #F2C744;
      box-shadow: 0 0 16px rgba(242, 199, 68, 0.2);
    }

    .menu-item-subtitle {
      font-size: 0.75rem;
      color: rgba(250, 246, 238, 0.6);
      font-style: italic;
      margin-top: 2px;
      line-height: 1.35;
    }

    .icon-red {
      color: #EF3340;
      stroke: #EF3340;
    }

    .icon-gold {
      color: #F2C744;
      stroke: #F2C744;
    }
  </style>

    function detectLanguage() {
      const saved = localStorage.getItem('bistro_lang');
      if (saved && ['fr', 'es', 'en', 'nl'].includes(saved)) return saved;

      const browserLang = (navigator.language || 'es').substring(0, 2).toLowerCase();
      const supportedLangs = ['fr', 'es', 'en', 'nl'];

      return supportedLangs.includes(browserLang) ? browserLang : 'es';
    }

    let currentLang = detectLanguage();
    let deferredInstallPrompt = null;

    function isIos() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function isInStandaloneMode() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function updateInstallUI() {
      const installBtn = document.getElementById('install-app-btn');
      const iosHelp = document.getElementById('ios-install-help');

      if (!installBtn) return;

      if (isInStandaloneMode()) {
        installBtn.hidden = true;
        if (iosHelp) iosHelp.hidden = true;
        return;
      }

      if (deferredInstallPrompt || isIos()) {
        installBtn.hidden = false;
      } else {
        installBtn.hidden = true;
      }
    }

    async function handleInstallClick() {
      const iosHelp = document.getElementById('ios-install-help');

      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        updateInstallUI();
        return;
      }

      if (isIos() && !isInStandaloneMode()) {
        if (iosHelp) iosHelp.hidden = false;
      }
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      updateInstallUI();
    });

    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      updateInstallUI();
    });

    const categoryIcons = {
      snacks: 'utensils-crossed',
      entrees: 'soup',
      plats: 'chef-hat',
      moules: 'fish',
      desserts: 'cake',
      crepes: 'circle',
      suggestions: 'star',
      supplements: 'plus-circle',
      boissons: 'glass-water',
      allergenes: 'alert-triangle'
    };

    function renderMenuItem(item, t) {
      const itemData = t.items[item.id];
      if (!itemData) return '';

      let priceDisplay = '';

      if (item.noPrice) {
        priceDisplay = '';
      } else if (item.price) {
        priceDisplay = `<span class="text-sm font-semibold text-gold ml-4 whitespace-nowrap">${item.price}</span>`;
      } else {
        priceDisplay = `<span class="text-sm font-semibold text-gold ml-4 whitespace-nowrap">${t[item.specialPriceText]}</span>`;
      }

      return `
        <div class="menu-item-row flex justify-between items-baseline py-2.5 px-3 rounded-lg">
          <div class="flex-1">
            <span class="text-sm text-cream/90">${itemData.name}</span>
            ${itemData.subtitle ? `<div class="menu-item-subtitle">${itemData.subtitle}</div>` : ''}
          </div>
          ${priceDisplay}
        </div>
      `;
    }

    function getCategoryIconClass(categoryKey) {
      return categoryKey === 'allergenes' ? 'icon-gold' : 'icon-red';
    }

    function renderCategory(categoryKey, categoryLabel, t) {
      const items = menuData[categoryKey];
      if (!items) return '';

      const icon = categoryIcons[categoryKey] || 'utensils-crossed';
      const iconClass = getCategoryIconClass(categoryKey);

      if (items.length === 0) {
        return `
          <div class="menu-category mb-8" id="menu-${categoryKey}">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-8 h-8 rounded-lg bg-gold/10 border border-gold/20 flex items-center justify-center flex-shrink-0">
                <i data-lucide="${icon}" class="w-4 h-4 ${iconClass}"></i>
              </div>
              <h3 class="font-display text-lg font-bold text-cream tracking-wide uppercase">${categoryLabel}</h3>
              <div class="flex-1 h-px bg-gold/20"></div>
            </div>
            <div class="text-center py-8">
              <p class="text-sm text-cream/50 italic">${t.comingSoon}</p>
            </div>
          </div>
        `;
      }

      const itemsHTML = items.map(item => renderMenuItem(item, t)).join('');

      return `
        <div class="menu-category mb-8" id="menu-${categoryKey}">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 rounded-lg bg-gold/10 border border-gold/20 flex items-center justify-center flex-shrink-0">
              <i data-lucide="${icon}" class="w-4 h-4 ${iconClass}"></i>

            <h3 class="font-display text-lg font-bold text-cream tracking-wide uppercase">${categoryLabel}</h3>
            <div class="flex-1 h-px bg-gold/20"></div>
          </div>
          <div class="space-y-1">
            ${itemsHTML}
          </div>
        </div>
      `;

          </button>
        </section>

        <section class="px-6 py-6 animate-fade-up delay-3">
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-snacks').scrollIntoView({behavior:'smooth'})">${t.snacks}</button>
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-entrees').scrollIntoView({behavior:'smooth'})">${t.entrees}</button>
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-plats').scrollIntoView({behavior:'smooth'})">${t.plats}</button>
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-moules').scrollIntoView({behavior:'smooth'})">${t.moules}</button>
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-desserts').scrollIntoView({behavior:'smooth'})">${t.desserts}</button>
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-crepes').scrollIntoView({behavior:'smooth'})">${t.crepes}</button>
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-suggestions').scrollIntoView({behavior:'smooth'})">${t.suggestions}</button>
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-supplements').scrollIntoView({behavior:'smooth'})">${t.supplements}</button>
            <button class="btn-action px-4 py-2.5 rounded-lg border-2 border-gold/60 text-xs font-medium text-cream hover:border-gold hover:bg-gold/10 active:bg-gold/15 transition-all" onclick="document.getElementById('menu-boissons').scrollIntoView({behavior:'smooth'})">${t.boissons}</button>
          </div>
        </section>

        <div class="diamond-divider">
          <span></span><span></span><span></span>
        </div>

        <section class="px-6 pb-6 animate-fade-up delay-4">
          <h2 class="font-display text-2xl font-bold text-gold text-center mb-6">${t.ourMenu}</h2>
          ${menuHTML}
        </section>

        <div class="diamond-divider">
          <span></span><span></span><span></span>
        </div>

        <section class="px-6 pb-6 animate-fade-up delay-5">
          ${renderAllergenSection(t)}
        </section>

        <div class="diamond-divider">
          <span></span><span></span><span></span>
        </div>

        <section class="px-6 pb-6 animate-fade-up delay-5">
          <div class="flex items-start gap-3 p-4 rounded-lg bg-darkCard border border-gold/20">
            <i data-lucide="info" class="w-5 h-5 text-gold flex-shrink-0 mt-0.5"></i>
            <p class="text-sm text-cream/80 whitespace-pre-line">${t.allergenInfo}</p>
          </div>
        </section>

        <div class="diamond-divider">
          <span></span><span></span><span></span>
        </div>

        <footer class="px-6 pt-4 pb-10 text-center animate-fade-up delay-5">
          <div class="space-y-6">
            <div>
              <div class="flex items-center justify-center gap-2 mb-2">
                <i data-lucide="map-pin" class="w-4 h-4 text-gold"></i>
                <h4 class="font-display text-sm font-bold text-gold uppercase tracking-wider">${t.address}</h4>
              </div>
              <p class="text-sm text-cream/60 leading-relaxed">Rue de la Croix Jurlet 291<br>4040 Herstal</p>
            </div>

            <div>
              <div class="flex items-center justify-center gap-2 mb-3">
                <i data-lucide="clock" class="w-4 h-4 text-gold"></i>
                <h4 class="font-display text-sm font-bold text-gold uppercase tracking-wider">${t.hours}</h4>
              </div>
              <div class="inline-block text-left">
                <div class="grid grid-cols-2 gap-x-6 gap-y-1.5 text-sm">
                  <span class="text-cream/50">${t.tueFri}</span>
                  <span class="text-cream/80 font-medium">${t.tueFriHours}</span>
                  <span class="text-cream/50">${t.satSun}</span>
                  <span class="text-cream/80 font-medium">${t.satSunHours}</span>
                  <span class="text-cream/50">${t.monday}</span>
                  <span class="text-cream/40 italic">${t.closed}</span>
                </div>
              </div>
            </div>

            <div class="flex justify-center gap-1 pt-4">
              <div class="w-8 h-0.5 rounded-full bg-dark border border-gray-700"></div>
              <div class="w-8 h-0.5 rounded-full bg-gold"></div>
              <div class="w-8 h-0.5 rounded-full" style="background:#EF3340;"></div>
            </div>

            <div class="pt-5 flex justify-center">
              <div class="flex items-center gap-4 px-5 py-4 rounded-2xl bg-white/5 border-2 border-gold/40 shadow-lg">
                <div class="w-16 h-16 rounded-full overflow-hidden flex-shrink-0 border-2 border-gold/30 bg-white">
                  <img
                    src="${siteConfig.brandLogoUrl}"
                    alt="FJ"
                    class="w-full h-full object-contain"
                    loading="lazy"
                    decoding="async"
                    referrerpolicy="no-referrer"
                    crossorigin="anonymous"
                    onerror="this.style.display='none';"
                  >
                </div>

                <div class="leading-tight text-left">
                  <div class="text-base font-semibold text-cream tracking-wide">
                    ${siteConfig.productName}
                  </div>

                  <div class="text-sm text-gold/80 mt-1">
                    ${siteConfig.productSignature}
                  </div>
                </div>
              </div>
            </div>

            <p class="text-xs text-cream/30 mt-4">${t.copyright}</p>
          </div>
        </footer>
      `;

      if (window.lucide) {
        requestAnimationFrame(() => {
          lucide.createIcons();
        });
      }

      updateInstallUI();
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderMenu();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.update());
        });

        navigator.serviceWorker.register('/demo-menu/sw.js?v=4').then((registration) => {
          registration.update();
        });
      }

      const detectedLangBtn = document.querySelector(`[data-lang="${currentLang}"]`);
      if (detectedLangBtn) {
        detectedLangBtn.classList.add('active');
      }

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const lang = e.currentTarget.dataset.lang;
          localStorage.setItem('bistro_lang', lang);

          document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');

          currentLang = lang;
          renderMenu();
          window.scrollTo(0, 0);
        });
      });
    });
  </script>
</body>
</html>
